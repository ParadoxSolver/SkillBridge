{% extends 'base.html' %}
{% block title %}Delete {{ listing.title }} — SkillBridge{% endblock %}

{% block content %}
<section class="max-w-lg mx-auto px-4 sm:px-6 lg:px-8 py-16 text-center">
  <div class="bg-white border-[3px] border-dark shadow-neo-lg rounded-2xl p-8">
    <p class="text-5xl mb-4">⚠️</p>
    <h1 class="text-2xl font-black mb-2">Delete Listing?</h1>
    <p class="text-gray-500 mb-6">Are you sure you want to delete <strong>"{{ listing.title }}"</strong>? This cannot be undone.</p>
    <form method="post" class="flex gap-4 justify-center">
      {% csrf_token %}
      <button type="submit" class="neo-btn bg-red-500 text-white font-bold px-6 py-3 border-[3px] border-dark shadow-neo rounded-md">Yes, Delete</button>
      <a href="{{ listing.get_absolute_url }}" class="neo-btn bg-white text-dark font-bold px-6 py-3 border-[3px] border-dark shadow-neo rounded-md">Cancel</a>
    </form>
  </div>
</section>
{% endblock %}
